name: eigen_guard
description: "EigenGuard - Structural Health Monitoring System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.4
  camera: ^0.11.1
  sensors_plus: ^7.0.0
  record: ^6.2.0
  audioplayers: ^6.1.0
  geolocator: ^13.0.2
  vibration: ^2.0.0
  flutter_blue_plus: ^1.32.12
  onnxruntime: ^1.4.1
  image: ^4.5.4
  permission_handler: ^11.3.1
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  # Sprint 16 — B2G ekotizimi: real MQTT broker + Nexus HTTP uploader
  mqtt_client: ^10.5.1
  http: ^1.2.2
  # Sprint 18 — Nexus auth + WebSocket
  flutter_secure_storage: ^9.2.2
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
